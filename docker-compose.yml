version: "3.9"
services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports: ["8080:8080"]
    env_file: ./backend/.env
    environment:
      - PORT=8080
      - CORS_ALLOWED_DOMAINS=emergentagent.com,emergent.host,emergent.sh
      - PLATFORM_PROFILE=${PLATFORM_PROFILE:-}
    depends_on: [mongodb, redis]
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports: ["3000:3000"]
    environment:
      - REACT_APP_BACKEND_URL=http://backend:8080
    depends_on: [backend]
    restart: unless-stopped

  mongodb:
    image: mongo:7
    ports: ["27017:27017"]
    volumes: ["mongo_data:/data/db"]
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    restart: unless-stopped

volumes:
  mongo_data:
